name: Deploy to Alibaba Cloud ECS

on:
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            echo "📂 Go to project"
            cd /root/xiaoxingAI

            echo "📥 Pull latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "🐍 Install backend dependencies"
            source /root/xiaoxingAI/.venv/bin/activate
            pip install -r requirements.txt

            echo "🧱 Build frontend"
            cd /root/xiaoxingAI/frontend
            npm install
            npm run build

            echo "🔁 Restart backend"
            systemctl restart xiaoxing

            echo "🔁 Reload nginx"
            nginx -t
            systemctl reload nginx

            echo "⏳ Wait for backend to become ready"
            for i in {1..15}; do
              if curl -fsS http://127.0.0.1:8000/health; then
                echo "✅ Backend is ready"
                break
              fi
              echo "Waiting... ($i)"
              sleep 2
            done

            echo "🔍 Final service status"
            systemctl status xiaoxing --no-pager

            echo "✅ HTTPS check"
            curl -k -I https://127.0.0.1 || true