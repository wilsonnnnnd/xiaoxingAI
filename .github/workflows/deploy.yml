name: Deploy to Azure VM

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bump frontend patch version
        id: version
        working-directory: frontend
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json frontend/package-lock.json
          git commit -m "chore: bump frontend version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Sync latest code on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            cd /home/weimeng/xiaoxingAI
            git fetch origin main
            git reset --hard origin/main

      - name: Install backend dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            cd /home/weimeng/xiaoxingAI
            source /home/weimeng/xiaoxingAI/.venv/bin/activate
            pip install -r requirements.txt

      - name: Build frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 22
            cd /home/weimeng/xiaoxingAI/frontend
            npm install
            npm run build

      - name: Publish frontend to nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            sudo mkdir -p /var/www/xiaoxing
            sudo rm -rf /var/www/xiaoxing/*
            sudo cp -r /home/weimeng/xiaoxingAI/frontend/dist/* /var/www/xiaoxing/
            sudo chown -R www-data:www-data /var/www/xiaoxing
            sudo chmod -R 755 /var/www/xiaoxing

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            sudo systemctl restart xiaoxing

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            sudo nginx -t
            sudo systemctl reload nginx

      - name: Check backend health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            for i in {1..15}; do
              if curl -fsS http://127.0.0.1:8000/health; then
                echo "Backend is ready"
                exit 0
              fi
              echo "Waiting for backend... ($i)"
              sleep 2
            done
            echo "Backend health check failed"
            exit 1

      - name: Show backend service status
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            sudo systemctl status xiaoxing --no-pager

      - name: Check public HTTPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e
            curl -I https://xiaoxingai.online
